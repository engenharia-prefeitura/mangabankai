<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Leitor — MangaBankai</title>
  <meta name="description" id="metaDesc" content="Leia capítulos de mangá online no MangaBankai.">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <meta id="ogTitle" property="og:title" content="MangaBankai">
  <meta id="ogDesc" property="og:description" content="Leia capítulos de mangá online no MangaBankai.">
  <meta id="ogImage" property="og:image" content="https://mangabankai.vercel.app/img/logo.png">
  <meta id="ogUrl" property="og:url" content="">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="MangaBankai">
  <meta id="twImage" name="twitter:image" content="https://mangabankai.vercel.app/img/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <link id="canonical" rel="canonical" href="">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/reader.css">
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="apple-touch-icon" href="/img/logo.png">
  <link rel="preconnect" href="https://www.highperformanceformat.com">
  <link rel="preconnect" href="https://pl30096193.effectivecpmnetwork.com">
  <link rel="preconnect" href="https://pl30096192.effectivecpmnetwork.com">
  <link rel="dns-prefetch" href="https://www.highperformanceformat.com">
  <link rel="dns-prefetch" href="https://pl30096193.effectivecpmnetwork.com">
  <link rel="dns-prefetch" href="https://pl30096192.effectivecpmnetwork.com">
  <script src="/js/pub.js"></script>
</head>
<body>
  <script>ADS.guard();</script>
  <!-- Barra de progresso de leitura (preenche conforme rola) -->
  <div id="readingProgress"></div>
  <!-- Main Site Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo"><img src="/img/logo.png" alt="MangaBankai" class="logo-img"></a>
      <button class="header-hamburger" aria-label="Abrir menu" onclick="toggleHeaderMenu()">☰</button>
      <div class="header-menu" id="headerMenu">
      <nav class="nav">
        <a href="/">Início</a>
        <a href="/catalog.html">Catálogo</a>
      </nav>
      </div>
      <div class="header-menu-overlay" id="headerMenuOverlay" onclick="toggleHeaderMenu()"></div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Pesquisar mangás..." autocomplete="off">
        <button class="search-btn" onclick="const q=document.getElementById('searchInput').value.trim();if(q)window.location.href='/catalog.html?q='+encodeURIComponent(q)">🔍</button>
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
    </div>
  </header>

  <!-- Exit Fullscreen Floating Button -->
  <button id="exitFullscreenBtn" onclick="toggleFullscreen()" title="Sair da Tela Cheia">✕</button>

  <!-- Voltar ao topo (rola o #readerContent) -->
  <button id="readerTopBtn" onclick="document.getElementById('readerContent').scrollTo({top:0,behavior:'smooth'})" title="Voltar ao topo" aria-label="Voltar ao topo">↑</button>

  <div class="reader-wrapper">
    <!-- Sidebar Chapter List -->
    <div class="reader-sidebar" id="readerSidebar">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>Capítulos</h3>
        <button class="rh-btn" onclick="toggleSidebar()" style="font-size:0.8rem">✕</button>
      </div>
      <div id="sidebarChapters"></div>
    </div>

    <!-- Reader Main -->
    <div class="reader-main">
      <!-- Reader Header -->
      <div class="reader-header">
        <div class="left">
          <a href="/" class="rh-back" title="Início">‹ Início</a>
          <a id="readerBackManga" class="rh-back" title="Página do Mangá">‹ Mangá</a>
          <button class="rh-toggle" onclick="toggleSidebar()" title="Lista de Capítulos">☰</button>
          <div class="rh-info">
            <h2 id="readerTitle">Carregando...</h2>
            <span id="readerChapter">Capítulo</span>
          </div>
          <span class="lang-badge" id="readerLangBadge">EN</span>
        </div>
        <div class="right">
          <select id="langSelect" onchange="switchReaderLang(this.value)" style="margin-right: 8px; display: none; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: #000; color: #fff;"></select>
          <select id="chapterSelect" onchange="loadChapterBySelect(this.value)"></select>
          <button class="rh-btn" onclick="toggleSettings()" title="Configurações">⚙️</button>
          <button class="rh-btn" onclick="toggleFullscreen()" title="Tela Cheia">⛶</button>
        </div>
      </div>

      <!-- Settings Panel (no topo, junto da barra da engrenagem) -->
      <div class="reader-settings-panel" id="settingsPanel">
        <div class="rsp-inner">
          <div class="rsp-group">
            <label>Modo</label>
            <select id="pageMode" onchange="onSettingChange()">
              <option value="scroll">Rolagem Contínua</option>
              <option value="single">Página Única</option>
              <option value="double">Duas Páginas</option>
            </select>
          </div>
          <div class="rsp-group" id="dirGroup">
            <label>Direção</label>
            <select id="readingDirection" onchange="onSettingChange()">
              <option value="ltr">Esquerda → Direita</option>
              <option value="rtl">Direita → Esquerda</option>
            </select>
          </div>
          <div class="rsp-group">
            <label>Brilho</label>
            <input type="range" id="brightness" min="30" max="150" value="100" oninput="onBrightnessChange(this.value)">
            <span id="brightnessVal" style="font-size:0.75rem;color:var(--text-muted);min-width:30px">100%</span>
          </div>
          <div class="rsp-group">
            <label>Fundo</label>
            <select id="bgColor" onchange="onSettingChange()">
              <option value="#000000">Preto</option>
              <option value="#0a0a0a">Cinza Escuro</option>
              <option value="#1a1a1a">Cinza</option>
              <option value="#f5f0e8">Bege</option>
              <option value="#ffffff">Branco</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Reader Content -->
      <div class="reader-content" id="readerContent">
        <div class="reader-pages" id="readerPages" style="display:none">
          <div class="page-placeholder">Carregando páginas...</div>
        </div>
        <div class="reader-scroll" id="readerScroll" style="display:none"></div>
      </div>

      <!-- Page Mode Navigation -->
      <div class="reader-nav" id="readerNav">
        <button id="prevChapterBtn" onclick="navChapter(-1)">‹ Capítulo Anterior</button>
        <button id="prevPageBtn" onclick="navPage(-1)">‹ Anterior</button>
        <span class="page-info" id="pageInfo">-</span>
        <button id="nextPageBtn" onclick="navPage(1)">Próxima ›</button>
        <button id="nextChapterBtn" onclick="navChapter(1)">Próximo Capítulo ›</button>
      </div>

      <!-- Fim do capítulo: navegação em destaque + relacionados (mais páginas/sessão + SEO) -->
      <div class="chapter-end" id="chapterEnd" style="display:none; max-width:1000px; margin:32px auto; padding:0 16px;"></div>

    </div>
  </div>

  <script src="/js/data.js"></script>
  <script src="/js/main.js"></script>
  <script>
    // ========== STATE ==========
    let currentMangaSlug = null;
    let currentMangaData = null;
    let currentChapter = null;
    let currentPageIdx = 0;
    let pages = [];
    let realPageCount = 0;
    let chaptersList = [];

    // ========== URL PARAMS ==========
    function getParams() {
      const p = new URLSearchParams(window.location.search);
      let manga = p.get('manga');
      // cap=<número> é a forma limpa; chapter=<id> mantido para retrocompatibilidade
      let chapter = p.get('cap') || p.get('chapter');

      // Vercel rewrite é server-side: o browser mantém a URL limpa /manga/<id>/<cap>
      // sem query string. Parseamos o pathname quando os params não estão presentes.
      if (!manga) {
        const parts = window.location.pathname.split('/').filter(Boolean);
        // pathname: ['manga', '<id>', '<cap>']
        if (parts[0] === 'manga' && parts.length >= 3) {
          manga = parts[1];
          if (chapter == null) chapter = parts[2];
        }
      }

      // lang: explícito na URL > preferência salva > 'en'
      let lang = p.get('lang');
      if (!lang) {
        try { const v = localStorage.getItem('ms_global_lang'); if (v) { const pv = JSON.parse(v); if (pv !== 'all') lang = pv; } } catch(e) {}
      }
      return { manga, chapter, lang: lang || 'en' };
    }

    // ========== INIT ==========
    (async function() {
      const params = getParams();
      if (params.manga && params.chapter != null) {
        await loadChapter(params.manga, params.chapter, params.lang);
      } else {
        document.getElementById('readerContent').innerHTML =
          '<div style="text-align:center;padding:80px 20px;color:var(--text-muted)">Selecione um mangá e capítulo para começar a ler.</div>';
        document.getElementById('readerNav').style.display = 'none';
      }

      const settings = getReaderSettings();
      document.getElementById('pageMode').value = settings.pageMode || 'scroll';
      document.getElementById('readingDirection').value = settings.direction || 'ltr';
      document.getElementById('brightness').value = settings.brightness || 100;
      document.getElementById('bgColor').value = settings.bgColor || '#000000';
      applyReaderSettings();
    })();

    // ========== SETTINGS ==========
    function applyReaderSettings() {
      const bg = document.getElementById('bgColor').value;
      const bri = document.getElementById('brightness').value;
      document.documentElement.style.setProperty('--reader-bg', bg);
      document.querySelector('.reader-content').style.filter = `brightness(${bri / 100})`;

      const mode = document.getElementById('pageMode').value;
      const isScroll = mode === 'scroll';
      const rp = document.getElementById('readerPages');
      const rs = document.getElementById('readerScroll');
      const dg = document.getElementById('dirGroup');
      if (rp) rp.style.display = isScroll ? 'none' : 'block';
      if (rs) rs.style.display = isScroll ? 'block' : 'none';
      if (dg) dg.style.display = isScroll ? 'none' : 'flex';

      const nav = document.getElementById('readerNav');
      if (nav) nav.style.display = isScroll ? 'none' : 'flex';

      if (pages.length > 0) renderPages();

      var lang = getParams().lang;
      document.getElementById('readerLangBadge') && (document.getElementById('readerLangBadge').textContent = lang.toUpperCase());

      saveReaderSettings({
        direction: document.getElementById('readingDirection').value,
        pageMode: mode,
        brightness: parseInt(bri),
        bgColor: bg
      });
    }

    function onSettingChange() { applyReaderSettings(); }

    function onBrightnessChange(val) {
      document.getElementById('brightnessVal').textContent = val + '%';
      applyReaderSettings();
    }

    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('open');
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }

    function toggleSidebar() {
      document.getElementById('readerSidebar').classList.toggle('open');
    }

    // ========== LOAD CHAPTER ==========
    async function loadChapter(mangaId, chapterId, lang) {
      lang = lang || 'en';

      // Load chapters data from chapters.json
      const allChapters = await loadChapters(mangaId);

      // Find the manga slug
      let slug = mangaId;
      let manga = getManga(mangaId);

      if (manga) {
        const adultGenres = ['Adulto', 'Hentai', 'Ecchi', 'Mature', 'Smut'];
        const isAdult = (manga.genres || []).some(g => adultGenres.includes(g));
        const adultMode = LS.get('adult_mode', false);
        if (isAdult && !adultMode) {
          showAdultConfirmationModal(() => {
            LS.set('adult_mode', true);
            window.location.reload();
          }, () => {
            window.location.href = '/';
          });
          return;
        }
      }

      currentMangaSlug = slug;
      currentMangaData = manga;

      // Resolve a língua correta com base na disponibilidade de capítulos do mangá
      let realLang = lang;
      chaptersList = getChapters(slug, realLang);
      if (chaptersList.length === 0) {
        realLang = lang === 'pt' ? 'en' : 'pt';
        chaptersList = getChapters(slug, realLang);
      }
      if (chaptersList.length === 0) {
        const chData = window.chaptersData && window.chaptersData[slug];
        if (chData) {
          const availableLangs = Object.keys(chData).filter(l => Array.isArray(chData[l]) && chData[l].length > 0);
          if (availableLangs.length > 0) {
            realLang = availableLangs[0];
            chaptersList = chData[realLang];
          }
        }
      }
      if (chaptersList.length === 0) {
        showError('Capítulos não encontrados para este mangá.');
        return;
      }
      lang = realLang; // Atualiza a variável de escopo para as chamadas subsequentes

      // Find the specific chapter
      let chapter = chaptersList.find(c => c.id === chapterId);
      if (!chapter) {
        // Try finding by number
        chapter = chaptersList.find(c => c.number === parseFloat(chapterId));
      }
      if (!chapter) {
        showError('Capítulo não encontrado.');
        return;
      }

      currentChapter = chapter;
      currentPageIdx = 0;
      pages = chapter.pages || [];

      // Resolve as páginas sob demanda pelo servidor (lista EXATA, sem 404) — PT e EN.
      // EN cai na descoberta no cliente só se o painel não responder.
      if (pages.length === 0 && chapter.number) {
        const mSlug = manga ? manga.slug : slug;
        const isLocal = ['localhost', '127.0.0.1', ''].includes(location.hostname);
        const RESOLVE_BASE = window.RESOLVE_BASE || (isLocal ? 'http://localhost:3001' : location.origin);
        showMessage('Carregando páginas...');

        // 1) Servidor: devolve a lista exata e a salva no JSON do capítulo.
        try {
          const res = await fetch(`${RESOLVE_BASE}/resolve-chapter?lang=${encodeURIComponent(lang)}&mangaId=${encodeURIComponent(slug)}&slug=${encodeURIComponent(mSlug)}&chNum=${encodeURIComponent(chapter.number)}`);
          const data = await res.json();
          if (data.success && data.pages && data.pages.length > 0) {
            pages = data.pages;
            chapter.pages = pages;
          }
        } catch (e) { /* segue para o fallback abaixo */ }

        // 2) Fallback
        if (pages.length === 0) {
          if (lang === 'pt') {
            showError('Não foi possível obter as páginas. Verifique se o painel admin está rodando na porta 3001.');
            return;
          }
          // EN: descoberta no cliente como último recurso (caso o painel esteja off)
          showMessage('Descobrindo páginas...');
          pages = await discoverPages(chapter, mSlug);
          if (pages.length === 0) {
            showError('Não foi possível carregar as páginas deste capítulo.');
            return;
          }
        }
      }

      const title = manga ? manga.title : slug;
      document.title = `${title} — Capítulo ${chapter.number} — MangaBankai`;

      // SEO / Open Graph dinâmico do capítulo
      try {
        const _pageTitle = `${title} — Capítulo ${chapter.number}`;
        const _desc = `Leia ${title} capítulo ${chapter.number} online em ${lang === 'pt' ? 'português' : 'inglês'} no MangaBankai.`;
        const _cover = (manga && manga.cover) || '';
        const _absCover = _cover && !/^https?:\/\//.test(_cover) ? (location.origin + _cover) : _cover;
        const _url = `${location.origin}/manga/${encodeURIComponent(slug)}/${encodeURIComponent(chapter.number)}`;
        const _set = (id, attr, val) => { const el = document.getElementById(id); if (el) el.setAttribute(attr, val); };
        _set('metaDesc', 'content', _desc);
        _set('ogTitle', 'content', _pageTitle + ' — MangaBankai');
        _set('ogDesc', 'content', _desc);
        _set('ogImage', 'content', _absCover);
        _set('twImage', 'content', _absCover);
        _set('ogUrl', 'content', _url);
        _set('canonical', 'href', _url);
      } catch (e) {}

      document.getElementById('readerTitle').textContent = title;
      document.getElementById('readerChapter').textContent = `Capítulo ${chapter.number}`;
      document.getElementById('readerBackManga').href = /^[a-z0-9-]+$/.test(slug) ? `/manga/${slug}/` : `/manga.html?id=${slug}`;

      // Chapter select
      const sel = document.getElementById('chapterSelect');
      sel.innerHTML = chaptersList.map(c =>
        `<option value="${c.number}" ${c.number === chapter.number ? 'selected' : ''}>Capítulo ${c.number}</option>`
      ).join('');

      // Language select dropdown setup
      const availableLangs = Object.keys(chaptersData[mangaId] || {});
      const langSel = document.getElementById('langSelect');
      if (langSel) {
        if (availableLangs.length > 1) {
          langSel.style.display = 'inline-block';
          langSel.innerHTML = availableLangs.map(l =>
            `<option value="${l}" ${l === lang ? 'selected' : ''}>${l.toUpperCase()}</option>`
          ).join('');
        } else {
          langSel.style.display = 'none';
        }
      }

      // Sidebar chapters with read indicators
      const readChapters = LS.get('read_' + slug, []);
      document.getElementById('sidebarChapters').innerHTML = chaptersList.map(c => {
        const isRead = readChapters.includes(c.id);
        const readClass = isRead ? 'read' : '';
        return `<button class="rs-chapter ${c.id === chapter.id ? 'active' : ''} ${readClass}" onclick="window.location.href='/manga/${slug}/${c.number}'">Capítulo ${c.number}</button>`;
      }).join('');

      // Mark current chapter as read
      if (!readChapters.includes(chapter.id)) {
        readChapters.push(chapter.id);
        LS.set('read_' + slug, readChapters);
      }

      // Nav buttons
      const chIdx = chaptersList.findIndex(c => c.id === chapter.id);
      document.getElementById('prevChapterBtn').disabled = chIdx === 0;
      document.getElementById('nextChapterBtn').disabled = chIdx === chaptersList.length - 1;

      // Bloco de fim de capítulo (navegação grande + relacionados)
      renderChapterEnd(manga, slug, chIdx);

      realPageCount = pages.length;
      pages = injectAdPages(pages);
      renderPages();
      saveProgress(slug, chapter.id, 0, pages.length, chapter.number);
      if (window.registerMangaView) window.registerMangaView(slug);

      ADS.renderPopunder();
    }

    function loadChapterBySelect(capNumber) {
      if (currentMangaSlug) window.location.href = `/manga/${currentMangaSlug}/${capNumber}`;
    }

    function switchReaderLang(newLang) {
      const params = getParams();
      const newChapters = getChapters(currentMangaSlug, newLang);
      let targetCapNumber = null;
      if (currentChapter && newChapters.length > 0) {
        const matching = newChapters.find(c => c.number === currentChapter.number);
        if (matching) targetCapNumber = matching.number;
      }
      if (targetCapNumber == null && newChapters.length > 0) {
        targetCapNumber = newChapters[newChapters.length - 1].number;
      }
      if (targetCapNumber != null) {
        window.location.href = `/manga/${currentMangaSlug}/${targetCapNumber}`;
      }
    }

    function showError(msg) {
      const rp = document.getElementById('readerPages');
      if (rp) {
        rp.style.display = 'block';
        rp.innerHTML = `<div class="page-placeholder">${msg}</div>`;
      } else {
        document.getElementById('readerContent').innerHTML =
          `<div style="text-align:center;padding:80px 20px;color:var(--text-muted)">${msg}</div>`;
      }
      document.getElementById('readerNav').style.display = 'none';
    }
    function showMessage(msg) {
      const rp = document.getElementById('readerPages');
      if (rp) {
        rp.style.display = 'block';
        rp.innerHTML = `<div class="page-placeholder">${msg}</div>`;
      } else {
        document.getElementById('readerContent').innerHTML =
          `<div style="text-align:center;padding:80px 20px;color:var(--text-muted)">${msg}</div>`;
      }
    }

    // ========== AD PAGES ==========
    const AD_SENTINEL_MID = '__AD_MID__';
    const AD_SENTINEL_END = '__AD_END__';

    function isAdSentinel(v) {
      return v === AD_SENTINEL_MID || v === AD_SENTINEL_END;
    }

    function injectAdPages(arr) {
      if (arr.length < 2) return arr;
      const out = [...arr];
      const mid = Math.ceil(out.length / 2);
      out.splice(mid, 0, AD_SENTINEL_MID);
      out.push(AD_SENTINEL_END);
      return out;
    }

    function getSpreads() {
      const mode = document.getElementById('pageMode').value;
      let activeMode = mode;
      if (mode === 'double' && window.innerWidth <= 768) {
        activeMode = 'single';
      }

      if (activeMode !== 'double') {
        return pages.map((_, i) => [i]);
      }

      const spreads = [];
      let i = 0;
      while (i < pages.length) {
        if (isAdSentinel(pages[i])) {
          spreads.push([i]);
          i++;
        } else {
          if (i + 1 < pages.length && !isAdSentinel(pages[i + 1])) {
            spreads.push([i, i + 1]);
            i += 2;
          } else {
            spreads.push([i]);
            i++;
          }
        }
      }
      return spreads;
    }

    function renderAdPage(container, pageIdx) {
      container.innerHTML = '';
      const isMid = pages[pageIdx] === AD_SENTINEL_MID;
      const wrap = document.createElement('div');
      wrap.className = 'page-container';
      const adEl = isMid ? ADS.buildMidPage() : ADS.buildEndPage();
      wrap.appendChild(adEl);
      container.appendChild(wrap);
      // Carrega ads direto — elemento já está no DOM e visível
      if (isMid) ADS.fillMidPage(adEl); else ADS.fillEndPage(adEl);
    }

    function loadScrollAdPage(el) {
      if (el.dataset.adLoaded) return;
      el.dataset.adLoaded = 'true';
      const isMid = el.dataset.adType === 'mid';
      const adEl = isMid ? ADS.buildMidPage() : ADS.buildEndPage();
      el.appendChild(adEl);
      // Elemento já está visível (IntersectionObserver do scroll confirmou)
      if (isMid) ADS.fillMidPage(adEl); else ADS.fillEndPage(adEl);
    }

    // ========== RENDER PAGES ==========
    function renderPages() {
      const mode = document.getElementById('pageMode').value;
      if (mode === 'scroll') return renderScrollMode();

      const container = document.getElementById('readerPages');
      container.style.display = 'block';
      const rs = document.getElementById('readerScroll');
      if (rs) rs.style.display = 'none';

      if (pages.length === 0) {
        container.innerHTML = '<div class="page-placeholder">Nenhuma página disponível.</div>';
        return;
      }

      const dir = document.getElementById('readingDirection').value;

      // Force single page on mobile screens for double page mode
      let activeMode = mode;
      if (mode === 'double' && window.innerWidth <= 768) {
        activeMode = 'single';
      }

      if (activeMode === 'single') {
        const url = pages[currentPageIdx];
        if (isAdSentinel(url)) {
          renderAdPage(container, currentPageIdx);
        } else {
          container.innerHTML = `
            <div class="page-container">
              <img class="reader-page-img"
                src="${url}"
                alt="Página ${currentPageIdx + 1}"
                referrerPolicy="no-referrer"
                onerror="this.style.display='none'"
                loading="${currentPageIdx === 0 ? 'eager' : 'lazy'}">
            </div>
          `;
        }
      } else if (activeMode === 'double') {
        const spreads = getSpreads();
        const currentSpread = spreads.find(s => s.includes(currentPageIdx)) || [currentPageIdx];

        if (currentSpread.length === 1) {
          const idx = currentSpread[0];
          const url = pages[idx];
          if (isAdSentinel(url)) {
            renderAdPage(container, idx);
          } else {
            container.innerHTML = `
              <div class="page-container">
                <img class="reader-page-img"
                  src="${url}"
                  alt="Página ${idx + 1}"
                  referrerPolicy="no-referrer"
                  onerror="this.style.display='none'"
                  loading="${idx === 0 ? 'eager' : 'lazy'}">
              </div>
            `;
          }
        } else {
          const idx1 = currentSpread[0];
          const idx2 = currentSpread[1];
          const url1 = pages[idx1];
          const url2 = pages[idx2];
          
          if (dir === 'rtl') {
            container.innerHTML = `
              <div class="page-container double">
                <div class="page-col">
                  <img class="reader-page-img"
                    src="${url2}"
                    alt="Página ${idx2 + 1}"
                    referrerPolicy="no-referrer"
                    onerror="this.style.display='none'"
                    loading="lazy">
                </div>
                <div class="page-col">
                  <img class="reader-page-img"
                    src="${url1}"
                    alt="Página ${idx1 + 1}"
                    referrerPolicy="no-referrer"
                    onerror="this.style.display='none'"
                    loading="${idx1 === 0 ? 'eager' : 'lazy'}">
                </div>
              </div>
            `;
          } else {
            container.innerHTML = `
              <div class="page-container double">
                <div class="page-col">
                  <img class="reader-page-img"
                    src="${url1}"
                    alt="Página ${idx1 + 1}"
                    referrerPolicy="no-referrer"
                    onerror="this.style.display='none'"
                    loading="${idx1 === 0 ? 'eager' : 'lazy'}">
                </div>
                <div class="page-col">
                  <img class="reader-page-img"
                    src="${url2}"
                    alt="Página ${idx2 + 1}"
                    referrerPolicy="no-referrer"
                    onerror="this.style.display='none'"
                    loading="lazy">
                </div>
              </div>
            `;
          }
        }
      }

      updatePageInfo();
    }

    // ========== SCROLL MODE ==========
    let scrollObserver = null;
    function renderScrollMode() {
      const container = document.getElementById('readerScroll');
      container.style.display = 'block';
      const rp = document.getElementById('readerPages');
      if (rp) rp.style.display = 'none';

      if (pages.length === 0) {
        container.innerHTML = '<div class="scroll-page"><div class="page-placeholder">Nenhuma página disponível.</div></div>';
        return;
      }

      container.innerHTML = pages.map((url, i) => {
        if (url === AD_SENTINEL_MID) {
          return `<div class="scroll-page" data-page="${i + 1}" data-ad-type="mid" style="min-height:600px;display:flex;align-items:center;justify-content:center;padding:20px 0;"></div>`;
        }
        if (url === AD_SENTINEL_END) {
          return `<div class="scroll-page" data-page="${i + 1}" data-ad-type="end" style="min-height:380px;display:flex;align-items:center;justify-content:center;padding:20px 0;"></div>`;
        }
        return `
        <div class="scroll-page skeleton" data-page="${i + 1}" style="min-height:700px; display:flex; align-items:center; justify-content:center;">
          <img class="reader-page-img lazy-page-img"
            data-src="${rdProxyPage(url)}"
            alt="Página ${i + 1}"
            referrerPolicy="no-referrer"
            onload="this.classList.add('loaded'); this.parentElement.classList.remove('skeleton');"
            onerror="this.style.display='none'; this.parentElement.style.display='none';">
        </div>`;
      }).join('');

      // Setup intersection observer targeting readerContent as viewport
      if (scrollObserver) scrollObserver.disconnect();
      const scrollRoot = document.getElementById('readerContent');
      scrollObserver = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            if (entry.target.dataset.adType) {
              loadScrollAdPage(entry.target);
            } else {
              const img = entry.target.querySelector('img');
              if (img && img.dataset.src) {
                img.src = img.dataset.src;
                delete img.dataset.src;
              }
            }
            obs.unobserve(entry.target);
          }
        });
      }, { root: scrollRoot, rootMargin: '800px 0px' });

      container.querySelectorAll('.scroll-page').forEach(page => scrollObserver.observe(page));

      const prog = getProgress(currentMangaSlug);
      if (prog && prog.pageIndex > 0) {
        setTimeout(() => {
          const target = container.querySelector(`[data-page="${prog.pageIndex + 1}"]`);
          if (target) target.scrollIntoView({ block: 'start' });
        }, 100);
      }
    }

    // ========== NAVIGATION ==========
    function updatePageInfo() {
      if (document.getElementById('pageMode').value === 'scroll') {
        document.getElementById('pageInfo').textContent = `${realPageCount} páginas`;
        return;
      }
      const isAd = isAdSentinel(pages[currentPageIdx]);
      const realIdx = pages.slice(0, currentPageIdx + 1).filter(p => !isAdSentinel(p)).length;
      document.getElementById('pageInfo').textContent = isAd ? 'Publicidade' : `${realIdx} de ${realPageCount}`;
      
      const spreads = getSpreads();
      const currentSpreadIdx = spreads.findIndex(s => s.includes(currentPageIdx));
      document.getElementById('prevPageBtn').disabled = currentSpreadIdx === 0;
      document.getElementById('nextPageBtn').disabled = currentSpreadIdx >= spreads.length - 1;
    }

    function navPage(delta) {
      if (document.getElementById('pageMode').value === 'scroll') return;

      const dir = document.getElementById('readingDirection').value;
      let actualDelta = dir === 'rtl' ? -delta : delta;

      const spreads = getSpreads();
      const currentSpreadIdx = spreads.findIndex(s => s.includes(currentPageIdx));

      const newSpreadIdx = currentSpreadIdx + actualDelta;
      if (newSpreadIdx >= 0 && newSpreadIdx < spreads.length) {
        currentPageIdx = spreads[newSpreadIdx][0];
        renderPages();
        if (currentMangaSlug && currentChapter) {
          saveProgress(currentMangaSlug, currentChapter.id, currentPageIdx, pages.length);
        }
      }
    }

    function navChapter(delta) {
      if (!currentMangaSlug || !currentChapter) return;
      const idx = chaptersList.findIndex(c => c.id === currentChapter.id);
      const newIdx = idx + delta;
      if (newIdx >= 0 && newIdx < chaptersList.length) {
        const ch = chaptersList[newIdx];
        const params = getParams();
        const dest = `/manga/${currentMangaSlug}/${ch.number}`;
        if (delta > 0) {
          ADS.showTransition(`Começar Capítulo ${ch.number} →`, () => {
            window.location.href = dest;
          });
        } else {
          window.location.href = dest;
        }
      }
    }

    // Capas do MangaFreak precisam passar pelo proxy (hotlink protection)
    function rdProxyCover(cover) {
      if (!cover) return '';
      if (cover.startsWith('https://images.mangafreak.me/')) return '/api/img-proxy?url=' + encodeURIComponent(cover);
      if (cover.includes('placeholder.jpg')) return '';
      return cover;
    }

    function rdProxyPage(url) {
      if (!url) return '';
      const domainMatch = url.match(/^https?:\/\/([^/]+)/);
      if (domainMatch) {
        const domain = domainMatch[1];
        if (domain.includes('tankouhentai.com') || domain.includes('tiamanhwa.com') || domain.includes('mangadistrict.com')) {
          return '/api/img-proxy?url=' + encodeURIComponent(url);
        }
      }
      return url;
    }

    // Bloco no fim do capítulo: navegação grande + mangás relacionados.
    // Aumenta páginas por sessão (mais anúncios) e cria links internos (SEO).
    function renderChapterEnd(manga, slug, chIdx) {
      const box = document.getElementById('chapterEnd');
      if (!box) return;
      const hasPrev = chIdx > 0;
      const hasNext = chIdx < chaptersList.length - 1;

      // Relacionados: mangás que compartilham ao menos um gênero
      let related = [];
      try {
        if (manga && Array.isArray(manga.genres) && typeof MANGA_DATA !== 'undefined') {
          const gset = new Set(manga.genres);
          related = MANGA_DATA.filter(m => m && m.id !== manga.id && Array.isArray(m.genres) && m.genres.some(g => gset.has(g))).slice(0, 6);
        }
      } catch (e) {}

      const navBtns = `
        <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:8px;">
          <button onclick="navChapter(-1)" ${hasPrev ? '' : 'disabled'} style="padding:12px 22px; border-radius:12px; border:1px solid var(--border,#333); background:rgba(255,255,255,0.05); color:var(--text,#eee); font-weight:600; cursor:${hasPrev ? 'pointer' : 'not-allowed'}; opacity:${hasPrev ? '1' : '0.4'};">‹ Capítulo Anterior</button>
          <a href="/manga.html?id=${encodeURIComponent(slug)}" style="padding:12px 22px; border-radius:12px; border:1px solid var(--border,#333); background:rgba(255,255,255,0.05); color:var(--text,#eee); font-weight:600; text-decoration:none; display:inline-flex; align-items:center;">📚 Todos os capítulos</a>
          <button onclick="shareLink(document.getElementById('readerTitle').textContent + (currentChapter ? ' — Capítulo ' + currentChapter.number : ''), 'Leia este capítulo no MangaBankai 📖', location.href)" style="padding:12px 22px; border-radius:12px; border:1px solid var(--border,#333); background:rgba(255,255,255,0.05); color:var(--text,#eee); font-weight:600; cursor:pointer;">🔗 Compartilhar</button>
          <button onclick="navChapter(1)" ${hasNext ? '' : 'disabled'} style="padding:12px 26px; border-radius:12px; border:none; background:var(--accent,#6c63ff); color:#fff; font-weight:700; cursor:${hasNext ? 'pointer' : 'not-allowed'}; opacity:${hasNext ? '1' : '0.4'};">Próximo Capítulo ›</button>
        </div>`;

      let relHtml = '';
      if (related.length) {
        relHtml = `
          <div style="margin-top:28px;">
            <h3 style="font-size:1rem; margin-bottom:14px; color:var(--text,#eee);">Você também pode gostar</h3>
            <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:14px;">
              ${related.map(m => {
                const cov = rdProxyCover(m.cover);
                const img = cov
                  ? `<img src="${cov}" alt="${(m.title||'').replace(/"/g,'&quot;')}" referrerPolicy="no-referrer" loading="lazy" style="width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:8px;" onerror="this.style.visibility='hidden'">`
                  : `<div style="width:100%; aspect-ratio:2/3; background:rgba(255,255,255,0.08); border-radius:8px;"></div>`;
                return `<a href="/manga.html?id=${encodeURIComponent(m.id)}" style="text-decoration:none; color:var(--text,#eee);">
                  ${img}
                  <div style="font-size:0.78rem; margin-top:6px; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${(m.title||'').replace(/</g,'&lt;')}</div>
                </a>`;
              }).join('')}
            </div>
          </div>`;
      }

      box.innerHTML = navBtns + relHtml;
      box.style.display = 'block';
    }

    // ========== KEYBOARD ==========
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

      const mode = document.getElementById('pageMode').value;
      const dir = document.getElementById('readingDirection').value;

      switch (e.key) {
        case 'ArrowLeft':
          e.preventDefault();
          if (mode === 'scroll') { document.getElementById('readerScroll').scrollBy({ left: -200, behavior: 'smooth' }); }
          else navPage(dir === 'rtl' ? 1 : -1);
          break;
        case 'ArrowRight':
          e.preventDefault();
          if (mode === 'scroll') { document.getElementById('readerScroll').scrollBy({ left: 200, behavior: 'smooth' }); }
          else navPage(dir === 'rtl' ? -1 : 1);
          break;
        case 'ArrowUp':
          if (mode === 'scroll') { e.preventDefault(); document.getElementById('readerScroll').scrollBy({ top: -300, behavior: 'smooth' }); }
          else { e.preventDefault(); navChapter(-1); }
          break;
        case 'ArrowDown':
          if (mode === 'scroll') { e.preventDefault(); document.getElementById('readerScroll').scrollBy({ top: 300, behavior: 'smooth' }); }
          else { e.preventDefault(); navChapter(1); }
          break;
        case 'f': case 'F': toggleFullscreen(); break;
        case 's': case 'S': toggleSettings(); break;
      }
    });

    // Save scroll position and handle Focus Mode in scroll mode
    let scrollTimer;
    let lastScrollTop = 0;

    document.getElementById('readerContent')?.addEventListener('scroll', (e) => {
      const currentScroll = e.currentTarget.scrollTop;
      lastScrollTop = currentScroll;

      // Barra de progresso + botão "voltar ao topo"
      const _max = e.currentTarget.scrollHeight - e.currentTarget.clientHeight;
      const _pct = _max > 0 ? (currentScroll / _max) * 100 : 0;
      const _pb = document.getElementById('readingProgress');
      if (_pb) _pb.style.width = _pct + '%';
      const _tb = document.getElementById('readerTopBtn');
      if (_tb) _tb.classList.toggle('visible', currentScroll > 400);

      // Barras de navegação ficam SEMPRE visíveis (sem auto-ocultar).
      document.querySelector('.reader-header')?.classList.remove('hide-bar');
      document.querySelector('.reader-nav')?.classList.remove('hide-bar');

      if (document.getElementById('pageMode').value !== 'scroll') return;

      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const container = document.getElementById('readerScroll');
        const scrollPages = container.querySelectorAll('.scroll-page');
        let visiblePage = 0;
        scrollPages.forEach((sp, i) => {
          const rect = sp.getBoundingClientRect();
          // Detect which page is active in viewport
          if (rect.top < window.innerHeight / 2) visiblePage = i;
        });
        
        currentPageIdx = visiblePage;
        if (currentMangaSlug && currentChapter) {
          saveProgress(currentMangaSlug, currentChapter.id, currentPageIdx, pages.length);
        }
      }, 300);
    });

    // ========== CLICK NAVIGATION (page mode) ==========
    document.getElementById('readerContent')?.addEventListener('click', (e) => {
      if (document.getElementById('pageMode').value === 'scroll') return;
      
      // Do not navigate if clicking buttons, selects, or settings panel
      if (e.target.closest('#settingsPanel') || e.target.tagName === 'SELECT' || e.target.closest('.rh-btn') || e.target.closest('.rh-toggle') || e.target.closest('a')) return;

      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const w = rect.width;
      // Clica na metade esquerda → volta; metade direita → avança.
      // (navPage já inverte conforme a direção de leitura LTR/RTL.)
      if (x < w * 0.5) navPage(-1);
      else navPage(1);
    });
  </script>
</body>
